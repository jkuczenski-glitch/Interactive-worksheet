<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bronco Digital Scavenger Hunt</title>
  <style>
    :root {
      --ink: #20242a;
      --muted: #6a717c;
      --line: #d7dce3;
      --panel: #f6f7f9;
      --accent: #a32035;
      --accent-quiet: #f8e8eb;
      --paper: #fffdf8;
      --shadow: 0 18px 50px rgba(24, 35, 52, 0.14);
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: #edf0f4;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 18px;
      border-bottom: 1px solid #dfe3e8;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(16px);
      position: sticky;
      top: 0;
      z-index: 3;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 230px;
      font-weight: 720;
      font-size: 15px;
    }
    .mark {
      width: 42px;
      height: 30px;
      border-radius: 7px;
      display: grid;
      place-items: center;
      background: #a32035;
      color: white;
      font-weight: 800;
    }
    .tools {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    button,
    select,
    input[type="color"] {
      height: 38px;
      border: 1px solid #cfd5dd;
      background: white;
      color: var(--ink);
      border-radius: 7px;
      font: inherit;
    }
    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 650;
    }
